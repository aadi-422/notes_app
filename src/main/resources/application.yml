spring:
  application:
    name: notes-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:sqlite}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${PORT:8080}
  error:
    include-message: always

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  about:
    name: ${ABOUT_NAME:Notes API Developer}
    email: ${ABOUT_EMAIL:developer@example.com}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: false

---
spring:
  config:
    activate:
      on-profile: sqlite
  datasource:
    url: jdbc:sqlite:${SQLITE_PATH:./data/notes.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

---
spring:
  config:
    activate:
      on-profile: postgres
    import: application-postgres.yml

# Loaded when profile=postgres. Requires DB_HOST or DATABASE_URL (see RenderDatabaseEnvironmentPostProcessor).
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:notes_db}?sslmode=require
    username: ${DB_USER:notes_user}
    password: ${DB_PASSWORD}
    hikari:
      connection-timeout: 60000
      initialization-fail-timeout: 120000
      maximum-pool-size: 5
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

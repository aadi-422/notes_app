# Render Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: notes-api
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /about
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: ABOUT_NAME
        value: Notes API Developer
      - key: ABOUT_EMAIL
        value: developer@example.com
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:+UseContainerSupport -Xmx384m"

databases:
  - name: notes-db
    plan: free
    databaseName: notes_db
    user: notes_user

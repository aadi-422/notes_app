# Render Blueprint: https://render.com/docs/blueprint-spec
# Use internal DB_* fields (host/port) — NOT connectionString/DATABASE_URL (external URL fails in-container).
services:
  - type: web
    name: notes-api
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /about
    healthCheckGracePeriod: 300
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: ABOUT_NAME
        value: Notes API Developer
      - key: ABOUT_EMAIL
        value: developer@example.com
      # Internal connection (from same-region Render network)
      - key: DB_HOST
        fromDatabase:
          name: notes-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: notes-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: notes-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: notes-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: notes-db
          property: password
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:+UseContainerSupport -Xmx384m"

databases:
  - name: notes-db
    plan: free
    databaseName: notes_db
    user: notes_user

# Render Blueprint: https://render.com/docs/blueprint-spec
# Deploy: Dashboard → New → Blueprint → connect repo, or use "Apply" on an existing Blueprint.
services:
  - type: web
    name: notes-api
    runtime: docker
    plan: free
    region: oregon
    healthCheckPath: /about
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: ABOUT_NAME
        sync: false
      - key: ABOUT_EMAIL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString
      - key: JAVA_TOOL_OPTIONS
        value: "-XX:+UseContainerSupport"

databases:
  - name: notes-db
    plan: free
    databaseName: notes_db
    user: notes_user
